<body>
<nav style="position:sticky;top:0;z-index:1000;background:rgba(6,10,18,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06)">
<div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:48px">
<a href="/" style="font-size:0.9rem;font-weight:700;color:#fff;text-decoration:none;letter-spacing:-0.3px">Migrating Mammals</a>
<div style="display:flex;gap:8px">
<a href="/#tools" style="color:#8a94a6;text-decoration:none;font-size:0.82rem;font-weight:500;padding:6px 14px;border-radius:6px">Tools</a><a href="/#guides" style="color:#8a94a6;text-decoration:none;font-size:0.82rem;font-weight:500;padding:6px 14px;border-radius:6px">Guides</a><a href="/#lists" style="color:#8a94a6;text-decoration:none;font-size:0.82rem;font-weight:500;padding:6px 14px;border-radius:6px">Lists</a>
</div>
</div>
</nav>
  <script src="/nav.js"></script>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-content">
      <h1>Travel Guides</h1>
      <p>Comprehensive guides for digital nomads, remote workers, and frequent travelers.</p>

      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="Search guides by name or topic..." aria-label="Search guides">
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="results-header">
      <div class="results-count" id="resultsCount">Loading guides...</div>
    </div>

    <div class="guides-grid" id="guidesGrid">
      <!-- Cards will be injected here by JS -->
    </div>

    <div class="no-results" id="noResults">
      <div style="font-size: 2rem; margin-bottom: 10px;">🤷</div>
      <h3>No guides found</h3>
      <p>Try adjusting your search terms.</p>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    © <span id="year">2026</span> <a href="/">migratingmammals.com</a> · A <a href="https://gab.ae" target="_blank" rel="noopener">GAB Ventures</a> property
  </div>

  <script>
    // Data extracted from src/pages/index.astro
    const guides = [
      { emoji: "🇪🇺", name: "Schengen 90/180 Guide", slug: "/guide-schengen", desc: "Complete guide to the Schengen rule with calculation tips" },
      { emoji: "🛡️", name: "Travel Insurance Guide", slug: "/guide-travel-insurance", desc: "Compare SafetyWing, World Nomads, Genki for nomads" },
      { emoji: "💻", name: "Coworking Spaces Guide", slug: "/guide-coworking", desc: "How to choose coworking spaces with day pass tips" },
      { emoji: "🛂", name: "Remote Work Visas by Country", slug: "/guide-remote-work-visa", desc: "Visa requirements, costs, and application tips" },
      { emoji: "🐢", name: "Slow Travel Guide", slug: "/guide-slow-travel", desc: "Why month-long stays beat city hopping" }
    ];

    // Set current year in footer
    document.getElementById('year').textContent = new Date().getFullYear();

    // DOM Elements
    const guidesGrid = document.getElementById('guidesGrid');
    const searchInput = document.getElementById('searchInput');
    const resultsCount = document.getElementById('resultsCount');
    const noResults = document.getElementById('noResults');

    // Render cards function
    function renderCards(data) {
      guidesGrid.innerHTML = '';

      if (data.length === 0) {
        noResults.style.display = 'block';
        resultsCount.textContent = '0 guides';
        return;
      }

      noResults.style.display = 'none';
      resultsCount.textContent = `${data.length} guide${data.length !== 1 ? 's' : ''}`;

      data.forEach(guide => {
        const card = document.createElement('a');
        card.className = 'guide-card';
        // Check if slug has a leading slash, if so remove it or just use it.
        // We're at /guides/, so we should probably link to the root for these standalone pages
        // The slugs in index.astro start with /, so we use them directly.
        card.href = guide.slug;

        card.innerHTML = `
          <span class="guide-emoji">${guide.emoji}</span>
          <h3 class="guide-name">${guide.name}</h3>
          <p class="guide-desc">${guide.desc}</p>
        `;

        guidesGrid.appendChild(card);
      });
    }

    // Initial render
    renderCards(guides);

    // Search functionality
    searchInput.addEventListener('input', (e) => {
      const searchTerm = e.target.value.toLowerCase().trim();

      if (!searchTerm) {
        renderCards(guides);
        return;
      }

      const filteredGuides = guides.filter(guide =>
        guide.name.toLowerCase().includes(searchTerm) ||
        guide.desc.toLowerCase().includes(searchTerm)
      );

      renderCards(filteredGuides);
    });
  </script>
