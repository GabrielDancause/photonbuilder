<body>

<script src="/nav.js"></script>
<div class="hero">
  <div class="hero-content">
    <span class="tag">📋 LISTS</span>
    <h1>Curated Lists</h1>
    <p>Best tools, libraries, and resources for developers.</p>
    <div class="search-box">
      <input type="text" id="search" placeholder="Search lists..." autocomplete="off">
    </div>
  </div>
</div>
<div class="container">
  <div class="count"><span id="shown">0</span> lists</div>
  <div class="grid" id="grid"></div>
</div>
<div class="footer">© 2026 <a href="/">siliconbased.dev</a> · A <a href="https://gab.ae">GAB Ventures</a> property</div>
<script>
const lists = [
  { emoji: "📋", name: "VS Code Extensions", slug: "/list-vscode-extensions", desc: "Top VS Code extensions for web development" },
  { emoji: "📋", name: "Monospace Fonts for Coding", slug: "/list-monospace-fonts", desc: "Best coding fonts with ligature support" },
  { emoji: "📋", name: "CSS Frameworks Compared", slug: "/list-css-frameworks", desc: "Tailwind, Bootstrap, Bulma comparison" },
  { emoji: "📋", name: "Free Static Hosting", slug: "/list-static-hosting", desc: "GitHub Pages, Netlify, Vercel, Cloudflare Pages" },
  { emoji: "📋", name: "Free Icon Sets", slug: "/list-icon-sets", desc: "Lucide, Heroicons, Phosphor, Tabler icon libraries" },
  { emoji: "📋", name: "Static Site Generators", slug: "/list-ssg", desc: "Astro, Hugo, Eleventy, Next.js comparison" },
  { emoji: "📋", name: "API Testing Tools", slug: "/list-api-testing", desc: "Postman, Insomnia, Hoppscotch comparison" },
  { emoji: "📋", name: "Color Tools for Designers", slug: "/list-color-tools", desc: "Palette generators, contrast checkers, gradient makers" }
];

const grid = document.getElementById('grid');
const search = document.getElementById('search');
const shown = document.getElementById('shown');

function render(filter) {
  const q = (filter || '').toLowerCase();
  let count = 0;
  grid.innerHTML = '';
  lists.forEach(l => {
    if (q && !l.name.toLowerCase().includes(q) && !l.desc.toLowerCase().includes(q)) return;
    count++;
    const a = document.createElement('a');
    a.className = 'card';
    a.href = l.slug;
    a.innerHTML = `<span class="card-emoji">${l.emoji}</span><h3 class="card-name">${l.name}</h3><p class="card-desc">${l.desc}</p>`;
    grid.appendChild(a);
  });
  shown.textContent = count;
}

search.addEventListener('input', e => render(e.target.value));
render('');
</script>
