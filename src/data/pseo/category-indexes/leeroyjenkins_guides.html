<body>

  <script src="/nav.js"></script>

  <div class="hero">
    <div class="hero-content">
      <div class="tagline">Knowledge Base</div>
      <h1>Gaming Guides</h1>

      <div class="search-container">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search guides by name or description...">
      </div>
      <div class="guide-count" id="guideCount">Loading guides...</div>
    </div>
  </div>

  <div class="content-area">
    <div class="guides-grid" id="guidesGrid">
      <!-- Cards rendered via JS -->
    </div>
    <div class="no-results" id="noResults">
      No guides found matching your search.
    </div>
  </div>

  <div class="footer">
    © 2026 <a href="/">leeroyjenkins.quest</a> · A <a href="https://gab.ae">GAB Ventures</a> property
  </div>

  <script>
    const guides = [
      { emoji: "📺", name: "Streaming Setup Guide", slug: "/guide-streaming-setup", desc: "Complete streaming setup: OBS, audio, lighting, overlays" },
      { emoji: "⌨️", name: "Mechanical Keyboards Guide", slug: "/guide-mechanical-keyboards", desc: "Switches, actuation, polling rate, and recommendations" },
      { emoji: "🖱️", name: "Mouse Grip Styles Guide", slug: "/guide-mouse-grip", desc: "Palm, claw, fingertip grips with mouse recommendations" },
      { emoji: "📚", name: "FPS Optimization Guide", slug: "/guide-fps-optimization", desc: "Windows settings, drivers, in-game settings, hardware" },
      { emoji: "📚", name: "Monitor Buying Guide", slug: "/guide-monitor-buying", desc: "Panel types, refresh rate, response time, resolution" }
    ];

    const grid = document.getElementById('guidesGrid');
    const searchInput = document.getElementById('searchInput');
    const countDisplay = document.getElementById('guideCount');
    const noResults = document.getElementById('noResults');

    function renderCards(data) {
      grid.innerHTML = '';

      if (data.length === 0) {
        noResults.style.display = 'block';
      } else {
        noResults.style.display = 'none';
        data.forEach(guide => {
          const a = document.createElement('a');
          a.className = 'guide-card';
          a.href = guide.slug;

          a.innerHTML = `
            <span class="guide-emoji">${guide.emoji}</span>
            <h3 class="guide-name">${guide.name}</h3>
            <p class="guide-desc">${guide.desc}</p>
          `;

          grid.appendChild(a);
        });
      }

      countDisplay.textContent = `${data.length} guide${data.length === 1 ? '' : 's'}`;
    }

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const filtered = guides.filter(guide =>
        guide.name.toLowerCase().includes(query) ||
        guide.desc.toLowerCase().includes(query)
      );
      renderCards(filtered);
    });

    // Initial render
    renderCards(guides);
  </script>
