<html lang="en">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #060a12;
      color: #e0d5c8;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 100px 24px 60px;
      background: linear-gradient(180deg, #1a0f08 0%, #060a12 100%);
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 40%, rgba(196,149,106,0.08) 0%, transparent 60%);
    }
    .hero-content { position: relative; z-index: 1; }
    .hero .tagline {
      color: #C4956A;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 20px;
      color: #fff;
    }

    /* Search */
    .search-container {
      max-width: 500px;
      margin: 30px auto 0;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 16px 20px 16px 48px;
      background: #111318;
      border: 1px solid #1e2030;
      border-radius: 12px;
      color: #e0d5c8;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: #C4956A;
      box-shadow: 0 0 0 3px rgba(196,149,106,0.1);
    }
    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      font-size: 1.2rem;
    }
    .counter {
      color: #888;
      font-size: 0.9rem;
      margin-top: 12px;
      font-weight: 500;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 24px 80px;
      width: 100%;
    }

    /* Tools Grid */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .tool-card {
      background: #111318;
      border: 1px solid #1e2030;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.2s ease;
    }
    .tool-card:hover {
      border-color: #C4956A;
      transform: translateY(-2px);
    }
    .tool-emoji {
      font-size: 1.8rem;
      margin-bottom: 12px;
      display: block;
    }
    .tool-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .tool-desc {
      font-size: 0.85rem;
      color: #888;
      line-height: 1.5;
    }
    .no-results {
      text-align: center;
      padding: 40px;
      color: #888;
      grid-column: 1 / -1;
      background: #111318;
      border-radius: 12px;
      border: 1px dashed #1e2030;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 50px 24px;
      font-size: 0.85rem;
      color: #888;
      border-top: 1px solid #1e2030;
      background: #0a0b10;
    }
    .footer a {
      color: #C4956A;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 { font-size: 2.2rem; }
      .hero { padding: 80px 20px 40px; }
      .tools-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

        "desc": "VPN comparison for travelers and nomads"
      }
    ];

    const grid = document.getElementById('toolsGrid');
    const searchInput = document.getElementById('searchInput');
    const counter = document.getElementById('counter');

    function renderTools(toolsToRender) {
      grid.innerHTML = '';

      if (toolsToRender.length === 0) {
        grid.innerHTML = `<div class="no-results">No tools found matching your search.</div>`;
        counter.textContent = '0 tools';
        return;
      }

      toolsToRender.forEach(tool => {
        const card = document.createElement('a');
        card.href = tool.slug;
        card.className = 'tool-card';
        card.innerHTML = `
          <span class="tool-emoji">${tool.emoji}</span>
          <h2 class="tool-name">${tool.name}</h2>
          <p class="tool-desc">${tool.desc}</p>
        `;
        grid.appendChild(card);
      });

      counter.textContent = `${toolsToRender.length} tool${toolsToRender.length !== 1 ? 's' : ''}`;
    }

    function filterTools() {
      const query = searchInput.value.toLowerCase();
      const filtered = tools.filter(tool =>
        tool.name.toLowerCase().includes(query) ||
        tool.desc.toLowerCase().includes(query)
      );
      renderTools(filtered);
    }

    searchInput.addEventListener('input', filterTools);

    // Initial render
    renderTools(tools);
  </script>
