<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G86C7NJG3F"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-G86C7NJG3F');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaming Guides — leeroyjenkins.quest</title>
  <meta name="description" content="Complete gaming guides for competitive gaming, streaming, mechanical keyboards, and FPS optimization.">
  <link rel="canonical" href="https://leeroyjenkins.quest/guides/">
  <meta property="og:title" content="Gaming Guides — leeroyjenkins.quest">
  <meta property="og:description" content="Complete gaming guides for competitive gaming, streaming, mechanical keyboards, and FPS optimization.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #060a12;
      color: #c8d0de;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 100px 24px 60px;
      background: linear-gradient(180deg, #120e1e 0%, #060a12 100%);
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 40%, rgba(147,51,234,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-content { position: relative; z-index: 1; }
    .hero .tagline {
      color: #9333EA;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -1.5px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #fff 0%, #9333EA 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Search Bar */
    .search-container {
      max-width: 500px;
      margin: 0 auto 16px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      border-radius: 24px;
      background: #111318;
      border: 1px solid #1e2030;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }
    .search-input:focus {
      border-color: #9333EA;
      box-shadow: 0 0 0 2px rgba(147,51,234,0.2);
    }
    .search-input::placeholder {
      color: #5a6a80;
    }
    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #5a6a80;
      pointer-events: none;
    }
    .guide-count {
      color: #5a6a80;
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* Content Area */
    .content-area {
      flex: 1;
      padding: 40px 24px 80px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* Guides Grid */
    .guides-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .guide-card {
      background: #111318;
      border: 1px solid #1e2030;
      border-radius: 12px;
      padding: 24px 20px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.2s ease;
    }
    .guide-card:hover {
      border-color: #9333EA;
      transform: translateY(-2px);
    }
    .guide-emoji {
      font-size: 1.5rem;
      margin-bottom: 12px;
      display: block;
    }
    .guide-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #e0e8f0;
      margin-bottom: 8px;
    }
    .guide-desc {
      font-size: 0.85rem;
      color: #6a7a90;
      line-height: 1.5;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: #5a6a80;
      font-size: 1.1rem;
      display: none;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 50px 24px;
      font-size: 0.85rem;
      color: #3a4a5a;
      border-top: 1px solid #151f2e;
      background: #040810;
      margin-top: auto;
    }
    .footer a {
      color: #9333EA;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 { font-size: 2.2rem; }
      .hero { padding: 90px 20px 40px; }
      .content-area { padding: 30px 20px 60px; }
      .guides-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <script src="/nav.js"></script>

  <div class="hero">
    <div class="hero-content">
      <div class="tagline">Knowledge Base</div>
      <h1>Gaming Guides</h1>

      <div class="search-container">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search guides by name or description...">
      </div>
      <div class="guide-count" id="guideCount">Loading guides...</div>
    </div>
  </div>

  <div class="content-area">
    <div class="guides-grid" id="guidesGrid">
      <!-- Cards rendered via JS -->
    </div>
    <div class="no-results" id="noResults">
      No guides found matching your search.
    </div>
  </div>

  <div class="footer">
    © 2026 <a href="/">leeroyjenkins.quest</a> · A <a href="https://gab.ae">GAB Ventures</a> property
  </div>

  <script>
    const guides = [
      { emoji: "📺", name: "Streaming Setup Guide", slug: "/guide-streaming-setup", desc: "Complete streaming setup: OBS, audio, lighting, overlays" },
      { emoji: "⌨️", name: "Mechanical Keyboards Guide", slug: "/guide-mechanical-keyboards", desc: "Switches, actuation, polling rate, and recommendations" },
      { emoji: "🖱️", name: "Mouse Grip Styles Guide", slug: "/guide-mouse-grip", desc: "Palm, claw, fingertip grips with mouse recommendations" },
      { emoji: "📚", name: "FPS Optimization Guide", slug: "/guide-fps-optimization", desc: "Windows settings, drivers, in-game settings, hardware" },
      { emoji: "📚", name: "Monitor Buying Guide", slug: "/guide-monitor-buying", desc: "Panel types, refresh rate, response time, resolution" }
    ];

    const grid = document.getElementById('guidesGrid');
    const searchInput = document.getElementById('searchInput');
    const countDisplay = document.getElementById('guideCount');
    const noResults = document.getElementById('noResults');

    function renderCards(data) {
      grid.innerHTML = '';

      if (data.length === 0) {
        noResults.style.display = 'block';
      } else {
        noResults.style.display = 'none';
        data.forEach(guide => {
          const a = document.createElement('a');
          a.className = 'guide-card';
          a.href = guide.slug;

          a.innerHTML = `
            <span class="guide-emoji">${guide.emoji}</span>
            <h3 class="guide-name">${guide.name}</h3>
            <p class="guide-desc">${guide.desc}</p>
          `;

          grid.appendChild(a);
        });
      }

      countDisplay.textContent = `${data.length} guide${data.length === 1 ? '' : 's'}`;
    }

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const filtered = guides.filter(guide =>
        guide.name.toLowerCase().includes(query) ||
        guide.desc.toLowerCase().includes(query)
      );
      renderCards(filtered);
    });

    // Initial render
    renderCards(guides);
  </script>
</body>
</html>
