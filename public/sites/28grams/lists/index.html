<body>
<script src="/nav.js"></script>

<div class="hero">

</div>

<div class="search-container">
  <span class="search-icon">🔍</span>
  <input type="text" id="searchInput" class="search-input" placeholder="Search lists by name or description...">
</div>

<div class="counter" id="counterDisplay">Showing <span id="listCount">0</span> lists</div>

<div class="main">
  <div class="lists-grid" id="listsGrid">
    <!-- Cards will be populated here -->
  </div>
  <div class="no-results" id="noResults">
    No lists found matching your search. Try different keywords.
  </div>
</div>

<div class="footer">
  © 2026 <a href="/">28grams.vip</a> · A <a href="https://gab.ae">GAB Ventures</a> property
</div>

<script>
const lists = [
  { emoji: "⚖️", name: "Best Kitchen Scales", slug: "/list-kitchen-scales", desc: "Kitchen scales compared for capacity, precision, and value" },
  { emoji: "🍳", name: "Essential Kitchen Tools", slug: "/list-kitchen-tools", desc: "Must-have kitchen tools for every budget and skill level" },
  { emoji: "📚", name: "Best Cookbooks", slug: "/list-cookbooks", desc: "Curated cookbooks for baking, pastry, bread, and cooking" },
  { emoji: "🍳", name: "Best Cast Iron Skillets", slug: "/list-cast-iron", desc: "Cast iron skillets by weight, heat retention, value" },
  { emoji: "☕", name: "Best Coffee Grinders", slug: "/list-coffee-grinders", desc: "Coffee grinders by grind consistency, burr type, price" }
];

const listsGrid = document.getElementById('listsGrid');
const searchInput = document.getElementById('searchInput');
const listCount = document.getElementById('listCount');
const noResults = document.getElementById('noResults');

function renderLists(filterText = '') {
  listsGrid.innerHTML = '';
  let count = 0;
  const term = filterText.toLowerCase();

  lists.forEach(list => {
    if (list.name.toLowerCase().includes(term) || list.desc.toLowerCase().includes(term)) {
      count++;

      const a = document.createElement('a');
      a.className = 'list-card';
      a.href = list.slug;

      a.innerHTML = `
        <span class="list-emoji">${list.emoji}</span>
        <h2 class="list-name">${list.name}</h2>
        <p class="list-desc">${list.desc}</p>
      `;

      listsGrid.appendChild(a);
    }
  });

  listCount.textContent = count;

  if (count === 0) {
    noResults.style.display = 'block';
  } else {
    noResults.style.display = 'none';
  }
}

// Initial render
renderLists();

// Search listener
searchInput.addEventListener('input', (e) => {
  renderLists(e.target.value);
});
</script>
