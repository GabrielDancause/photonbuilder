<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060a12; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; }
    .code { font-size: 8rem; font-weight: 700; background: linear-gradient(135deg, #6366f1, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
    h1 { font-size: 1.5rem; margin: 1rem 0 0.5rem; color: #e2e8f0; }
    p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 2rem; }
    a { color: #6366f1; text-decoration: none; font-weight: 500; padding: 0.75rem 2rem; border: 1px solid #6366f1; border-radius: 8px; transition: all 0.2s; }
    a:hover { background: #6366f1; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>This page doesn't exist yet — but it might be on our roadmap.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
